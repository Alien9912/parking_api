$kind: http-request
name: get-room
url: http://127.0.0.1:5000/get-room
method: GET
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });


      pm.test("Response has rooms array", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('rooms');
          pm.expect(jsonData.rooms).to.be.an('array');
      });


      if (pm.response.json().rooms.length > 0) {
          var lastRoom = pm.response.json().rooms[pm.response.json().rooms.length - 1];
          pm.environment.set('roomId', lastRoom.roomId);
      }


      pm.environment.set('totalRoomsBeforeRequest',
      pm.response.json().rooms.length);
    language: text/javascript
order: 1000
