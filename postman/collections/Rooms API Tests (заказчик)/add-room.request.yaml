$kind: http-request
name: add-room
url: http://127.0.0.1:5000/get-room
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: '{"floor": 2, "guestNum": 3, "beds": 2, "price": 3500}'
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has rooms array", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('rooms');
          pm.expect(jsonData.rooms).to.be.an('array');
      });

      var totalBefore = parseInt(pm.environment.get('totalRoomsBeforeRequest'));
      var totalAfter = pm.response.json().rooms.length;
      pm.test("Rooms count increased by 1", function () {
          pm.expect(totalAfter).to.equal(totalBefore + 1);
      });
    language: text/javascript
order: 2000
