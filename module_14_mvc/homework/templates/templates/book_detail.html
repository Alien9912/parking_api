{% extends "base.html" %}

{% block content %}
<div style="margin:20px auto; width:60%; background:#f9f9f9; padding:20px; border-radius:10px;">
    <h2>{{ book.title }}</h2>
    <p><strong>Автор:</strong> <a href="{{ url_for('author_books', author_name=book.author) }}">{{ book.author }}</a></p>
    <p><strong>Просмотров:</strong> {{ book.views }}</p>
    <p><a href="{{ url_for('all_books') }}">← Назад к списку</a></p>
</div>
{% endblock %}
