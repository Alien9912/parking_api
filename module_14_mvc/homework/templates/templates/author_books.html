{% extends "base.html" %}

{% block content %}
<h1>Книги автора: {{ author }}</h1>
{% if books %}
<table class="customTable">
    <thead>
    <tr><th>Название</th><th>Просмотры</th></tr>
    </thead>
    <tbody>
    {% for book in books %}
    <tr>
        <td><a href="{{ url_for('book_detail', book_id=book.id) }}">{{ book.title }}</a></td>
        <td>{{ book.views }}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% else %}
<p>У этого автора пока нет книг.</p>
{% endif %}
<p><a href="{{ url_for('all_books') }}">← Ко всем книгам</a></p>
{% endblock %}
